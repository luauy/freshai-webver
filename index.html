<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FreshGPT | Independent</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #0d0f14;
            --accent: #4ade80;
            --text: #ffffff;
            --dim: #4b5563;
            --border: #1e293b;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .ai { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .user { align-self: flex-end; background: #1a1c23; color: var(--accent); border: 1px solid #2d3748; }

        .input-bar {
            padding: 20px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .inner-input {
            max-width: 800px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 30px;
            display: flex;
            padding: 5px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            outline: none;
            font-size: 16px;
        }

        button {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <i class="ph-bold ph-leaf"></i>
        <span>FreshGPT</span>
    </div>
    <i class="ph ph-cpu" style="color: var(--dim);"></i>
</header>

<main id="chat-window">
    <div class="msg ai">
        <b>System: Sovereign Core Active.</b><br>
        I am FreshGPT. I do not use external models. I am powered by my own internal training logic.
    </div>
</main>

<div class="input-bar">
    <div class="inner-input">
        <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
        <button id="send-btn"><i class="ph-bold ph-arrow-right"></i></button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    // --- SOVEREIGN TRAINING DATA ---
    // This is where you "teach" FreshGPT how to behave.
    const brain = {
        "hello": "System online. How can I assist your development today?",
        "status": "Core integrity 100%. Running localized on your device.",
        "who are you": "I am FreshGPT, an independent AI entity built for speed and privacy.",
        "roblox": "Roblox engine detected. Ready to optimize scripts.",
        "script": "Provide the parameters and I will generate a sovereign code block.",
        "help": "Available intents: Status, Identity, Scripting, Optimization.",
        "default": "Command analyzed. Logic path initialized, but no specific intent mapped yet."
    };

    function speak(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function process() {
        const query = input.value.toLowerCase().trim();
        if (!query) return;

        speak('user', query);
        input.value = '';

        // Simulate independent "thinking"
        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerHTML = "<i>Analyzing...</i>";
        chat.appendChild(aiMsg);

        setTimeout(() => {
            // Check the proprietary brain for a match
            let response = brain["default"];
            
            for (let key in brain) {
                if (query.includes(key)) {
                    response = brain[key];
                    break;
                }
            }
            
            aiMsg.innerHTML = response;
            chat.scrollTop = chat.scrollHeight;
        }, 600);
    }

    btn.addEventListener('click', process);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') process(); });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshGPT | Sovereign AI</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>

    <style>
        :root {
            --bg: #05070a;
            --panel: #0f1218;
            --accent: #00ffa3;
            --text-main: #e0e6ed;
            --text-dim: #94a3b8;
            --user-bubble: #1e293b;
            --ai-bubble: #111827;
            --border: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1rem 1.5rem;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
        }

        /* Engine Status Overlay */
        #engine-status {
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            font-size: 12px;
            font-family: monospace;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dim);
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        /* Chat Window */
        #chat-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* Input Area */
        .controls {
            padding: 1.5rem;
            background: linear-gradient(transparent, var(--bg));
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px;
            display: flex;
            gap: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: 0.2s;
        }

        button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { background: #334155; cursor: wait; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <i class="ph-fill ph-wind"></i>
        <span>FreshGPT</span>
    </div>
    <div style="color: var(--text-dim); font-size: 0.8rem;">v2.0.0-STABLE</div>
</header>

<div id="engine-status">
    <i class="ph ph-lightning"></i>
    <span id="status-text">Core Ready</span>
    <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<main id="chat-viewport">
    <div class="msg ai">
        System initialized. I am <b>FreshGPT</b>, a local-first intelligence. 
        Everything you type stays on this device.
    </div>
</main>

<div class="controls">
    <div class="input-wrapper">
        <input type="text" id="prompt" placeholder="Message FreshGPT..." autocomplete="off">
        <button id="send-btn" title="Send message">
            <i class="ph-bold ph-paper-plane-tilt"></i>
        </button>
    </div>
</div>

<script type="module">
    const viewport = document.getElementById('chat-viewport');
    const input = document.getElementById('prompt');
    const btn = document.getElementById('send-btn');
    const status = document.getElementById('status-text');
    const progBar = document.getElementById('progress-bar');
    const progFill = document.getElementById('progress-fill');

    let engine = null;

    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = content.replace(/\n/g, '<br>');
        viewport.appendChild(div);
        viewport.scrollTop = viewport.scrollHeight;
        return div;
    }

    async function startup() {
        if (engine) return;
        
        btn.disabled = true;
        progBar.style.display = 'block';
        status.innerText = "Downloading Model Assets...";

        try {
            // Using Qwen2-0.5B for maximum speed on mobile/tablets
            engine = await window.webllm.CreateMLCEngine(
                "Qwen2-0.5B-Instruct-q4f16_1-MLC", 
                { initProgressCallback: (p) => {
                    const percent = Math.round(p.progress * 100);
                    progFill.style.width = `${percent}%`;
                    status.innerText = `Booting: ${percent}% - ${p.text.split(']')[1] || 'Loading'}`;
                }}
            );
            status.innerText = "Engine Online";
            progBar.style.display = 'none';
            btn.disabled = false;
        } catch (err) {
            status.innerText = "Critical: WebGPU required.";
            console.error(err);
        }
    }

    async function runChat() {
        const query = input.value.trim();
        if (!query) return;

        if (!engine) await startup();

        addMessage('user', query);
        input.value = '';
        
        const aiMsg = addMessage('ai', '...');
        let streamText = "";

        try {
            const chunks = await engine.chat.completions.create({
                messages: [{ role: "user", content: query }],
                stream: true
            });

            for await (const chunk of chunks) {
                streamText += chunk.choices[0]?.delta?.content || "";
                aiMsg.innerHTML = streamText.replace(/\n/g, '<br>');
                viewport.scrollTop = viewport.scrollHeight;
            }
        } catch (e) {
            aiMsg.innerText = "Error: System could not generate response.";
        }
    }

    btn.addEventListener('click', runChat);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') runChat(); });
</script>

</body>
</html>
